name: Update Project Custom Field Date

on:
  schedule:
    - cron: '0 3 * * *'   # 日本時間 12時
    - cron: '0 9 * * *'   # 日本時間 18時
    - cron: '0 13 * * *'  # 日本時間 22時
  workflow_dispatch:

jobs:
  update-project-date:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Project Custom Field
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.P_TOKEN_PAT }}
          script: |
            // Step 1: プロジェクトのフィールド情報を取得
            const fieldQuery = `
              query {
                user(login: "${{ github.repository_owner }}") {
                  projectV2(number: 2) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options {
                            id
                            name
                          }
                        }
                        ... on ProjectV2Field {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `;

            const fieldResult = await github.graphql(fieldQuery);
            const project = fieldResult.user.projectV2;

            console.log("🔍 Project ID:", project.id);

            // Statusフィールドと完了日フィールドのIDを取得
            let statusFieldId = null;
            let dateFieldId = null;
            let statusFieldOptions = {};

            for (const field of project.fields.nodes) {
              if (field.name === "Status") {
                statusFieldId = field.id;
                if (field.options) {
                  field.options.forEach(opt => {
                    statusFieldOptions[opt.name] = opt.id;
                  });
                }
              }
              if (field.name === "完了日") {
                dateFieldId = field.id;
              }
            }

            console.log("✅ Status Field ID:", statusFieldId);
            console.log("✅ Date Field ID:", dateFieldId);
            console.log("📋 Status Options:", statusFieldOptions);

            // Step 2: ペーション処理ですべてのアイテムを取得
            let allItems = [];
            let hasNextPage = true;
            let cursor = null;
            let pageCount = 0;

            while (hasNextPage) {
              pageCount++;
              console.log(`\n📄 ページ ${pageCount} を取得中...`);

              const itemsQuery = `
                query {
                  user(login: "${{ github.repository_owner }}") {
                    projectV2(number: 2) {
                      items(first: 100, after: ${cursor ? `"${cursor}"` : 'null'}) {
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                              title
                            }
                          }
                          fieldValues(first: 10) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                field {
                                  ... on ProjectV2SingleSelectField {
                                    name
                                  }
                                }
                                name
                              }
                              ... on ProjectV2ItemFieldDateValue {
                                field {
                                  ... on ProjectV2Field {
                                    name
                                  }
                                }
                                date
                              }
                            }
                          }
                        }
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                      }
                    }
                  }
                }
              `;

              const itemResult = await github.graphql(itemsQuery);
              const items = itemResult.user.projectV2.items;

              console.log(`✓ ${items.nodes.length} 件取得`);
              allItems = allItems.concat(items.nodes);

              hasNextPage = items.pageInfo.hasNextPage;
              cursor = items.pageInfo.endCursor;

              if (hasNextPage) {
                console.log(`📌 次ページあり（カーソル: ${cursor.substring(0, 10)}...）`);
              }
            }

            console.log(`\n🎯 合計 ${allItems.length} 件のアイテムを取得しました`);

            // Step 3: 対象アイテムを抽出して更新
            let updatedCount = 0;
            const today = new Date().toISOString().split('T')[0];

            for (const item of allItems) {
              if (!item.content || !item.content.number) continue;

              let currentStatus = null;
              let currentDate = null;

              // 現在のStatusと完了日を取得
              for (const fieldValue of item.fieldValues.nodes) {
                if (fieldValue.field && fieldValue.field.name === "Status") {
                  currentStatus = fieldValue.name;
                }
                if (fieldValue.field && fieldValue.field.name === "完了日") {
                  currentDate = fieldValue.date;
                }
              }

              // Statusが「開発完了」「FW検証中」「終了」で、かつ完了日が未設定の場合のみ更新
              if ((currentStatus === "開発完了" || currentStatus === "FW検証中" || currentStatus === "終了") && !currentDate) {
                console.log(`📝 Issue #${item.content.number}: 完了日を設定します`);

                const updateMutation = `
                  mutation {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: "${project.id}"
                      itemId: "${item.id}"
                      fieldId: "${dateFieldId}"
                      value: { date: "${today}" }
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `;

                try {
                  await github.graphql(updateMutation);
                  console.log(`✅ Issue #${item.content.number}: 完了日を ${today} に更新しました`);
                  updatedCount++;
                } catch (error) {
                  console.error(`❌ Issue #${item.content.number}: 更新に失敗しました`, error.message);
                }
              } else if (currentStatus === "開発完了" || currentStatus === "FW検証中" || currentStatus === "終了") {
                if (currentDate) {
                  console.log(`⏭️  Issue #${item.content.number}: すでに完了日が設定されています（${currentDate}）`);
                }
              }
            }

            console.log(`\n🎉 更新完了: ${updatedCount}件のIssueを更新しました`);
