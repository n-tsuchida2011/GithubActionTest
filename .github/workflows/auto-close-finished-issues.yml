name: Auto Close Finished Issues

on:
  issues:
    types: [edited]

jobs:
  close-finished-issues:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get issue project status and close if finished
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            
            // GraphQL クエリで Issue に関連する Project と Status を取得
            const query = `
              query($owner:String!, $repo:String!, $issueNumber:Int!)
              {
                repository(owner: $owner, name: $repo)
                {
                  issue(number: $issueNumber)
                  {
                    projectsV2(first: 10)
                    {
                      nodes
                      {
                        id
                        title
                        fields(first: 20)
                        {
                          nodes
                          {
                            ... on ProjectV2Field
                            {
                              id
                              name
                            }
                            ... on ProjectV2SingleSelectField
                            {
                              id
                              name
                              options
                              {
                                id
                                name
                              }
                            }
                          }
                        }
                        items(first: 1, filter: {})
                        {
                          nodes
                          {
                            id
                            fieldValues(first: 20)
                            {
                              nodes
                              {
                                ... on ProjectV2ItemFieldSingleSelectValue
                                {
                                  field
                                  {
                                    ... on ProjectV2SingleSelectField
                                    {
                                      name
                                    }
                                  }
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;
            
            const response = await github.graphql(query,
            {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issueNumber: issue.number
            });
            
            console.log(JSON.stringify(response, null, 2));
            
            // Status 属性を抽出
            const project = response.repository.issue.projectsV2.nodes[0];
            if (!project)
            {
              console.log('Issue is not associated with any project');
              return;
            }
            
            const projectItem = project.items.nodes[0];
            const statusField = projectItem.fieldValues.nodes.find(fv => fv.field?.name === 'Status');            
            const currentStatus = statusField?.name;

            console.log(`Current status: ${currentStatus}`);
            
            // Status が「終了」の場合、Close
            if (currentStatus === '終了')
            {
              await github.rest.issues.update(
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed'
              });
              console.log(`Issue #${issue.number} has been closed.`);
            }